# CPU Profiler Configuration
# Shared by profiler_daemon.sh, generate_flamegraph.sh, and profiler.service

# Sampling frequency (Hz)
SAMPLE_FREQ=99

# Slice interval (seconds)
SLICE_INTERVAL=10

# Output directory
OUTPUT_DIR="/home/hongchu/code/simple-cpu-profiling/log/profiler"

# Data retention (minutes), slices older than this will be auto-deleted, 1440 = 24 hours
RETENTION_MINUTES=1440

# Cleanup check interval (seconds)
CLEANUP_INTERVAL=600

# PID file path
PID_FILE="/home/hongchu/code/simple-cpu-profiling/run/profiler.pid"

# Log file path
LOG_FILE="/home/hongchu/code/simple-cpu-profiling/log/profiler/profiler.log"
